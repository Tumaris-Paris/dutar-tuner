<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A bilingual (English & Uyghur) chromatic tuner for the Dutar — a traditional Uyghur two-stringed instrument." />
  <meta name="author" content="Tumaris Paris" />
  <meta name="theme-color" content="#BA7517" />

  <!-- Open Graph / Social sharing -->
  <meta property="og:title" content="Dutar Tuner — دۇتار تەڭشەگۈچ" />
  <meta property="og:description" content="Free web-based tuner for the traditional Uyghur Dutar instrument. Bilingual English & Uyghur." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://tumaris-paris.github.io/dutar-tuner/" />

  <!-- PWA support -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <title>Dutar Tuner — دۇتار تەڭشەگۈچ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Lateef:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="bg-pattern" aria-hidden="true"></div>

  <main class="app" role="main">

    <!-- Header -->
    <header class="header">
      <div class="header-ornament" aria-hidden="true">
        <span class="orn-diamond"></span>
        <span class="orn-line"></span>
        <span class="orn-diamond large"></span>
        <span class="orn-line"></span>
        <span class="orn-diamond"></span>
      </div>
      <h1 class="title-en">Dutar Tuner</h1>
      <p class="title-uy" lang="ug" dir="rtl">دۇتار تەڭشىگۈچ</p>
      <!-- <p class="subtitle">Traditional Uyghur Instrument · قەدىمىي ئۇيغۇر ئەسۋابى</p> -->
      <div class="header-ornament" aria-hidden="true">
        <span class="orn-diamond"></span>
        <span class="orn-line"></span>
        <span class="orn-diamond large"></span>
        <span class="orn-line"></span>
        <span class="orn-diamond"></span>
      </div>
    </header>

    <!-- Tuning selector -->
    <section class="section" aria-labelledby="tuning-label">
      <p class="section-label" id="tuning-label">
        Select Tuning · <span lang="ug" dir="rtl">تەڭشەك تاللاش</span>
      </p>
      <div class="tuning-buttons" role="group" aria-label="Tuning presets">
        <button class="tuning-btn active" data-tuning="DA" onclick="setTuning('DA')">
          D – A<br><span class="tuning-sub">Standard</span>
        </button>
        <button class="tuning-btn" data-tuning="GD" onclick="setTuning('GD')">
          G – D<br><span class="tuning-sub">Low</span>
        </button>
        <button class="tuning-btn" data-tuning="EB" onclick="setTuning('EB')">
          E – B<br><span class="tuning-sub">High</span>
        </button>
        <button class="tuning-btn" data-tuning="custom" onclick="openCustom()">
          ✎ Custom<br><span class="tuning-sub" lang="ug" dir="rtl">ئالاھىدە</span>
        </button>
      </div>
    </section>

    <!-- Custom tuning modal -->
    <div class="modal-overlay" id="customModal" role="dialog" aria-modal="true" aria-labelledby="custom-title" hidden>
      <div class="modal">
        <h2 class="modal-title" id="custom-title">Custom Tuning · <span lang="ug" dir="rtl">ئالاھىدە تەڭشەش</span></h2>
        <div class="custom-inputs">
          <div class="custom-input-group">
            <label for="customS1">String 1 frequency (Hz)</label>
            <input type="number" id="customS1" value="146.83" min="50" max="800" step="0.01" />
          </div>
          <div class="custom-input-group">
            <label for="customS2">String 2 frequency (Hz)</label>
            <input type="number" id="customS2" value="220.00" min="50" max="800" step="0.01" />
          </div>
        </div>
        <div class="modal-actions">
          <button class="modal-btn cancel" onclick="closeCustom()">Cancel</button>
          <button class="modal-btn confirm" onclick="applyCustom()">Apply</button>
        </div>
      </div>
    </div>

    <!-- String selector -->
    <section class="string-tabs" role="group" aria-label="String selector">
      <button class="string-tab active" id="tab1" onclick="selectString(0)" aria-pressed="true">
        <span class="string-note" id="s1note">D</span>
        <span class="string-label-en">String 1 · thick</span>
        <span class="string-label-uy" lang="ug" dir="rtl">1-تارا</span>
        <span class="play-ref-btn" onclick="event.stopPropagation(); selectString(0); playRef();" aria-label="Play reference tone for string 1">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </span>
      </button>
      <button class="string-tab" id="tab2" onclick="selectString(1)" aria-pressed="false">
        <span class="string-note" id="s2note">A</span>
        <span class="string-label-en">String 2 · thin</span>
        <span class="string-label-uy" lang="ug" dir="rtl">2-تارا</span>
        <span class="play-ref-btn" onclick="event.stopPropagation(); selectString(1); playRef();" aria-label="Play reference tone for string 2">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </span>
      </button>
    </section>

    <!-- Meter card -->
    <section class="meter-card" aria-label="Tuning meter">

      <div class="detected-display">
        <span class="detected-note" id="detectedNote" aria-live="polite" aria-label="Detected note">–</span>
        <span class="detected-freq" id="freqLabel">Play a string to begin · تارىنى چىلىڭ</span>
        <span class="cents-readout" id="centsLabel" aria-live="polite"></span>
      </div>

      <!-- SVG needle gauge -->
      <div class="gauge-wrap" role="img" aria-label="Tuning needle gauge">
        <svg class="gauge-svg" viewBox="0 0 320 130" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="flatGrad" x1="55" y1="115" x2="100" y2="29" gradientUnits="userSpaceOnUse">
              <stop offset="0%"   stop-color="#4A90D9" stop-opacity="1"/>
              <stop offset="100%" stop-color="#A8C8EE" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="sharpGrad" x1="220" y1="29" x2="265" y2="115" gradientUnits="userSpaceOnUse">
              <stop offset="0%"   stop-color="#E8A898" stop-opacity="0"/>
              <stop offset="100%" stop-color="#C0503A" stop-opacity="1"/>
            </linearGradient>
          </defs>
          <!-- All arcs share circle: center (160,115) r=105 -->
          <!-- Base track -->
          <path d="M 55 115 A 105 105 0 0 1 265 115" fill="none" stroke="#E8DFC4" stroke-width="12" stroke-linecap="round"/>
          <!-- Flat zone -->
          <path d="M 55 115 A 105 105 0 0 1 100 29" fill="none" stroke="url(#flatGrad)" stroke-width="12" stroke-linecap="round"/>
          <!-- Sharp zone -->
          <path d="M 220 29 A 105 105 0 0 1 265 115" fill="none" stroke="url(#sharpGrad)" stroke-width="12" stroke-linecap="round"/>
          <!-- In-tune zone -->
          <path d="M 142 12 A 105 105 0 0 1 178 12" fill="none" stroke="#7BBF3A" stroke-width="12" stroke-linecap="round"/>

          <!-- Tick marks — minor (every 15°, half-length 5) -->
          <line x1="257" y1="89"  x2="266" y2="87"  stroke="#C4B896" stroke-width="1"   stroke-linecap="round"/>
          <line x1="247" y1="65"  x2="255" y2="60"  stroke="#C4B896" stroke-width="1"   stroke-linecap="round"/>
          <line x1="210" y1="28"  x2="215" y2="20"  stroke="#C4B896" stroke-width="1"   stroke-linecap="round"/>
          <line x1="186" y1="18"  x2="189" y2="9"   stroke="#C4B896" stroke-width="1"   stroke-linecap="round"/>
          <line x1="134" y1="18"  x2="131" y2="9"   stroke="#C4B896" stroke-width="1"   stroke-linecap="round"/>
          <line x1="110" y1="28"  x2="105" y2="20"  stroke="#C4B896" stroke-width="1"   stroke-linecap="round"/>
          <line x1="73"  y1="65"  x2="65"  y2="60"  stroke="#C4B896" stroke-width="1"   stroke-linecap="round"/>
          <line x1="63"  y1="89"  x2="54"  y2="87"  stroke="#C4B896" stroke-width="1"   stroke-linecap="round"/>

          <!-- Tick marks — major (every 45°, half-length 9, bolder) -->
          <line x1="46"  y1="115" x2="64"  y2="115" stroke="#A89870" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="79"  y1="34"  x2="92"  y2="47"  stroke="#A89870" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="160" y1="1"   x2="160" y2="19"  stroke="#5A9E25" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="228" y1="34"  x2="241" y2="47"  stroke="#A89870" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="256" y1="115" x2="274" y2="115" stroke="#A89870" stroke-width="2.5" stroke-linecap="round"/>

          <!-- Labels -->
          <text x="30"  y="128" class="gauge-label flat-label">♭</text>
          <text x="278" y="128" class="gauge-label sharp-label">♯</text>

          <!-- Needle -->
          <line id="needle" x1="160" y1="115" x2="160" y2="12"
            stroke="#BA7517" stroke-width="2.5" stroke-linecap="round"
            transform="rotate(0, 160, 115)"
            style="transition: transform 0.12s ease-out;"/>
          <!-- Pivot -->
          <circle cx="160" cy="115" r="8" fill="#E8DFC4"/>
          <circle cx="160" cy="115" r="6" fill="#BA7517"/>
          <circle cx="160" cy="115" r="2.5" fill="#fff"/>
        </svg>
      </div>

      <!-- Status badge -->
      <div class="status-badge waiting" id="statusBadge" aria-live="polite">
        Waiting · <span lang="ug" dir="rtl">كۈتۈۋاتىدۇ</span>
      </div>

    </section>

    <!-- Start / Stop button -->
    <button class="start-btn" id="startBtn" onclick="toggleListening()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
      <span id="startBtnLabel">Start Tuning · تەڭشەشنى باشلاڭ</span>
    </button>

    <!-- Footer -->
    <footer class="footer">
      <div class="ornament-divider" aria-hidden="true">
        <span class="orn-line"></span>
        <span class="orn-diamond"></span>
        <span class="orn-diamond large"></span>
        <span class="orn-diamond"></span>
        <span class="orn-line"></span>
      </div>
      <p class="footer-text">
        Made with ♥ by <a href="https://github.com/Tumaris-Paris" target="_blank" rel="noopener noreferrer">Tumaris Paris</a>
      </p>
    </footer>

  </main>

  <script src="js/tuner.js"></script>
</body>
</html>
